name: HejmadiWeek
options:
  bundleIdPrefix: com.hejmadi
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.4"
  defaultConfig: Release
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "10"
    DEVELOPMENT_TEAM: "LB2RAFK9K9"
    SWIFT_STRICT_CONCURRENCY: minimal

configs:
  Debug: debug
  Release: release

targets:
  HejmadiWeek:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Sources
        excludes:
          - Widgets/**
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hejmadi.HejmadiWeek
        INFOPLIST_KEY_CFBundleDisplayName: HejmadiWeek
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        SUPPORTS_MACCATALYST: false
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: true
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_NSCalendarsUsageDescription: "HejmadiWeek bruger din kalender til at vise og oprette begivenheder."
        INFOPLIST_KEY_NSRemindersUsageDescription: "HejmadiWeek bruger påmindelser til at integrere to-do opgaver."
        ENABLE_PREVIEWS: true
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: HejmadiWeek.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - "iCloud.com.hejmadi.HejmadiWeek"
        com.apple.developer.icloud-services:
          - "CloudKit"
